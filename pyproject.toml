[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "python-token-killer"
version = "0.1.0"
description = "Minimize LLM tokens from Python objects — dicts, code, logs, diffs, and more."
readme = "README.md"
license = "MIT"
requires-python = ">=3.10"
authors = [{ name = "ptk contributors" }]
keywords = ["llm", "tokens", "compression", "agents", "langchain", "claude"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Topic :: Software Development :: Libraries",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]

[project.optional-dependencies]
tiktoken = ["tiktoken>=0.7"]
dev = ["pytest>=8", "tiktoken>=0.7"]

[project.urls]
Homepage = "https://github.com/ptk-ai/ptk"
Repository = "https://github.com/ptk-ai/ptk"

[tool.hatch.build.targets.wheel]
packages = ["src/ptk"]

[tool.pytest.ini_options]
testpaths = ["tests"]
