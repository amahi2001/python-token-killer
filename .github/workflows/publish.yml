name: Publish

# Trigger: tag a release on GitHub (e.g. v0.1.0)
# PyPI trusted publishing (OIDC) — no tokens or secrets required.
# Setup: https://docs.pypi.org/trusted-publishers/adding-a-publisher/
#   Publisher: amahi2001/python-token-killer
#   Workflow:  publish.yml
#   Environment: pypi
on:
  release:
    types: [published]

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0

      # Build wheel + sdist without uv.sources so the artifacts are
      # compatible with all PEP 517-compliant tools (pypa/build, pip, etc.)
      - name: Build
        run: uv build --no-sources

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build
    environment: pypi
    permissions:
      # Required for OIDC trusted publishing — no token needed
      id-token: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0

      # uv publish picks up OIDC token automatically in GitHub Actions
      # --check-url skips re-uploading files already on PyPI
      - name: Publish to PyPI
        run: uv publish --check-url https://pypi.org/simple/python-token-killer/
